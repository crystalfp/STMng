parser: 'vue-eslint-parser'

plugins:
    - vue
    - promise
    - import
    - '@typescript-eslint'
    - no-useless-assign
    - eslint-comments
    - unicorn
    - security
    - deprecate
    - sonarjs
    - regexp
    - '@alasdair/max-len'
    - tsdoc
    - electron-extension

extends:
    - eslint:recommended
    - plugin:eslint-comments/recommended
    - plugin:promise/recommended
    - plugin:import/recommended
    - plugin:import/typescript
    - 'plugin:@typescript-eslint/recommended'
    - 'plugin:@typescript-eslint/recommended-type-checked'
    - 'plugin:@typescript-eslint/stylistic-type-checked'
    - plugin:unicorn/recommended
    - plugin:security/recommended-legacy
    - plugin:sonarjs/recommended
    - plugin:regexp/recommended
    - plugin:vue/base
    - plugin:vue/vue3-essential
    - plugin:vue/vue3-recommended

parserOptions:
    parser: '@typescript-eslint/parser'
    ecmaVersion: 2022
    ecmaFeatures:
        impliedStrict: true
    project:
        - ./tsconfig.json
    warnOnUnsupportedTypeScriptVersion: false
    extraFileExtensions: ['.vue', '.mts']
    sourceType: module
    vueFeatures:
        filter: false

reportUnusedDisableDirectives: true

settings:
    import/parsers:
        '@typescript-eslint/parser': [.ts, .tsx]
    import/extensions: [.js, .ts, .vue, .mts]
    import/ignore: [node_modules]
    import/resolver:
        # You will also need to install and configure the TypeScript resolver
        # See also https://github.com/import-js/eslint-import-resolver-typescript#configuration
        typescript:
            alwaysTryTypes: true

        alias:
            map: {"@/": "./src/"}
            extensions: [.vue, .ts]

env:
    vue/setup-compiler-macros: true
    es2024: true
    browser: true
    node: true
    shared-node-browser: true

rules:
    '@typescript-eslint/consistent-type-assertions': [warn, {assertionStyle: 'as'}]
    '@typescript-eslint/array-type': [warn, {default: array, readonly: array}]

    max-len: [off, 130]
    '@alasdair/max-len/max-len':
        - warn
        - code: 130
          ignoreTrailingComments: true
          ignoreUrls: true
          ignoreStrings: true
          ignoreTemplateLiterals: true
          ignoreRegExpLiterals: true

    no-dupe-class-members: off
    '@typescript-eslint/no-dupe-class-members': error
    no-buffer-constructor: error
    no-redeclare: [off, {builtinGlobals: true}]
    '@typescript-eslint/no-redeclare': [error, {builtinGlobals: true}]
    no-unused-vars: off
    '@typescript-eslint/no-unused-vars': error
    no-empty-function: off
    '@typescript-eslint/no-empty-function': warn
    no-useless-constructor: off
    '@typescript-eslint/no-useless-constructor': warn
    lines-between-class-members: off
    '@typescript-eslint/lines-between-class-members': off
    quotes: [off, double, {avoidEscape: true}]
    '@typescript-eslint/quotes': [warn, double, {avoidEscape: true}]
    no-loop-func: off
    '@typescript-eslint/no-loop-func': error
    no-unused-expressions: off
    '@typescript-eslint/no-unused-expressions': warn
    space-before-function-paren: off
    '@typescript-eslint/space-before-function-paren':
        - error
        - anonymous: never
          named: never
          asyncArrow: always
    no-shadow: off
    '@typescript-eslint/no-shadow':
        - error
        - hoist: all
          builtinGlobals: false
          allow: [event, self, window]
    comma-spacing: off
    '@typescript-eslint/comma-spacing': [error, {before: false, after: true}]
    keyword-spacing: off
    '@typescript-eslint/keyword-spacing':
        - off
        - before: true
          after: false
          overrides:
            else: {after: true}
            return: {after: true}
            try: {after: true}
            catch: {after: false}
            case: {after: true}
            const: {after: true}
            throw: {after: true}
            let: {after: true}
            do: {after: true}
            of: {after: true}
            as: {after: true}
            finally: {after: true}
            from: {after: true}
            import: {after: true}
            export: {after: true}
            default: {after: true}
    object-curly-spacing: off
    '@typescript-eslint/object-curly-spacing': ['warn']
    brace-style: off
    '@typescript-eslint/brace-style': [warn, stroustrup, {allowSingleLine: true}]
    comma-dangle: [off, never]
    '@typescript-eslint/comma-dangle': [off, {arrays: only-multiline, objects: only-multiline}]
    no-implicit-coercion: error

    no-undef: error
    no-extend-native: error
    no-sequences: error
    no-new: error
    no-bitwise: error
    no-unsafe-negation: [warn, {enforceForOrderingRelations: true}]
    eqeqeq: [error, always]
    strict: [error, global]
    max-params: [warn, 6]
    space-before-blocks: warn
    no-unused-private-class-members: error
    guard-for-in: off
    no-unneeded-ternary: warn

    no-trailing-spaces: warn
    id-length: [warn, {exceptions: [i, j, k, x, y, z, w, h, r, g, a, b, c, t]}]
    prefer-const: warn
    for-direction: error
    no-template-curly-in-string: error
    consistent-return: [error, {treatUndefinedAsUnspecified: false}]
    no-unmodified-loop-condition: error
    array-bracket-spacing: [warn, never]
    spaced-comment: [warn, always, {markers: [':', '-', '+', '::', '/']}]
    no-var: error
    block-scoped-var: error
    yoda: error
    camelcase: [warn, {properties: never}]
    max-depth: [warn, 8]
    arrow-parens: error
    no-confusing-arrow: [error, {allowParens: false}]
    dot-location: [error, property]
    no-else-return: error
    no-throw-literal: off
    '@typescript-eslint/no-throw-literal': error
    require-await: off
    '@typescript-eslint/require-await': error
    no-return-await: off
    '@typescript-eslint/return-await': error
    dot-notation: off
    '@typescript-eslint/dot-notation': off
    eol-last: [error, always]
    newline-per-chained-call: [error, {ignoreChainWithDepth: 3}]
    nonblock-statement-body-position: [warn, beside]
    space-infix-ops: off
    '@typescript-eslint/space-infix-ops': off
    semi-spacing: error
    operator-assignment: [error, always]
    object-shorthand: [error, properties, {avoidQuotes: true}]
    no-process-exit: off
    no-negated-condition: warn
    no-constant-condition: [error, {checkLoops: false}]
    prefer-destructuring:
        - error
        - VariableDeclarator: {array: false, object: true}
          AssignmentExpression: {array: false, object: false}
        - enforceForRenamedProperties: false
    no-extra-parens: off
    '@typescript-eslint/no-extra-parens': [warn, functions]
    no-invalid-this: off
    '@typescript-eslint/no-invalid-this': [off, {capIsConstructor: false}]
    prefer-template: warn
    semi: off
    '@typescript-eslint/semi': [error, always]
    '@typescript-eslint/explicit-function-return-type': [warn, {allowExpressions: true}]
    '@typescript-eslint/method-signature-style': warn
    # '@typescript-eslint/no-implicit-any-catch': warn
    '@typescript-eslint/prefer-includes': warn
    '@typescript-eslint/prefer-nullish-coalescing': warn
    '@typescript-eslint/prefer-optional-chain': warn
    '@typescript-eslint/no-base-to-string': warn
    '@typescript-eslint/non-nullable-type-assertion-style': off
    '@typescript-eslint/no-unnecessary-type-assertion': off
    '@typescript-eslint/no-unnecessary-boolean-literal-compare': warn
    '@typescript-eslint/prefer-readonly': warn
    '@typescript-eslint/prefer-readonly-parameter-types': off
    '@typescript-eslint/no-confusing-void-expression': [off, {ignoreArrowShorthand: true}]
    '@typescript-eslint/explicit-member-accessibility':
        - warn
        - accessibility: 'explicit'
          overrides:
            constructors: 'no-public'
            properties: 'explicit'
            parameterProperties: 'explicit'
            methods: 'no-public'
            accessors: 'no-public'
    no-multiple-empty-lines: [warn, {max: 2, maxEOF: 1}]
    prefer-arrow-callback: warn
    array-callback-return: [error, {allowImplicit: true}]
    init-declarations: off
    '@typescript-eslint/init-declarations': off
    func-call-spacing: off
    '@typescript-eslint/func-call-spacing': warn
    default-param-last: off
    '@typescript-eslint/default-param-last': warn

    vue/first-attribute-linebreak: off
    vue/html-indent: off
    vue/max-attributes-per-line: off
    vue/html-closing-bracket-newline: off
    vue/multiline-html-element-content-newline: off
    vue/singleline-html-element-content-newline: off
    vue/no-v-html: off
    vue/multi-word-component-names: off

    # import/no-unresolved: off
    import/namespace: off
    import/no-named-as-default: off
    import/no-named-as-default-member: off
    import/default: off
    # import/no-deprecated: warn

    # optimize-regex/optimize-regex: off

    # jest-formatting/padding-around-expect-groups: warn
    # jest/no-disabled-tests: off

    unicorn/no-keyword-prefix: [warn, {checkProperties: false}]
    unicorn/prefer-array-some: warn
    unicorn/prefer-default-parameters: warn
    unicorn/prefer-array-index-of: warn
    unicorn/prefer-regexp-test: warn
    unicorn/consistent-destructuring: warn
    unicorn/prefer-string-starts-ends-with: warn
    '@typescript-eslint/prefer-string-starts-ends-with': warn
    unicorn/numeric-separators-style: [off, number: {onlyIfContainsSeparator: true, minimumDigits: 3}]
    unicorn/no-console-spaces: warn
    unicorn/prefer-string-replace-all: warn
    unicorn/prevent-abbreviations:
        - warn
        - replacements:
            len: false
            params: false
            doc: false
            pkg: false
            ctx: false
            i: false
            j: false
            idx: false
            args: false
            dir: false
            props: false
            db: false
            obj: false
            ext: false
            dist: false
          checkFilenames: false

    unicorn/template-indent:
        - warn
        - indent: 4
    unicorn/prefer-top-level-await: off
    unicorn/no-zero-fractions: off

    promise/catch-or-return: [off, {allowFinally: true}]

    no-useless-assign/no-useless-assign: warn

    deprecate/function: warn
    deprecate/member-expression: warn
    deprecate/import: off
    # '@delagen/deprecation/deprecation': warn

    # no-unsafe-regex/no-unsafe-regex: error

    '@typescript-eslint/member-delimiter-style': warn
    tsdoc/syntax: warn

    no-fallthrough: [error, { allowEmptyCase: true, commentPattern: "falls?\\s?through" }]

    electron-extension/no-incompatible-api: warn

    no-loss-of-precision: off
    '@typescript-eslint/no-loss-of-precision': error
    # no-magic-numbers: [off, {ignoreArrayIndexes: true, ignore: [0]}]
    # '@typescript-eslint/no-magic-numbers': [off, {ignoreArrayIndexes: true, ignore: [0]}]
    promise/always-return: off
    # linebreak-style: [off, windows]
    # no-tabs: off
    # one-var: [off, always]
    no-mixed-spaces-and-tabs: off
    # no-multi-spaces: off
    # no-plusplus: [off, {allowForLoopAfterthoughts: true}]
    # no-console: off
    unicorn/filename-case: [off, {case: camelCase}]
    unicorn/throw-new-error: off
    unicorn/new-for-builtins: off
    unicorn/expiring-todo-comments: off
    # unicorn/no-process-exit: 0
    # unicorn/prefer-query-selector: 0
    # unicorn/consistent-function-scoping: 0
    # unicorn/no-for-loop: 0
    # unicorn/no-useless-undefined: 0
    # unicorn/no-array-reduce: 0
    security/detect-non-literal-fs-filename: 0
    security/detect-object-injection: 0
    # '@typescript-eslint/interface-name-prefix': 0
    # indent: [off, tab]
    # '@typescript-eslint/indent': [off, tab]
    # no-use-before-define: off
    # '@typescript-eslint/no-use-before-define': off
    '@typescript-eslint/no-non-null-assertion': off
    sonarjs/cognitive-complexity: [off, 40]
    sonarjs/no-duplicate-string: [off, 6]
    sonarjs/elseif-without-else: 0
    sonarjs/no-nested-switch: 0
    unicorn/better-regex: off
    unicorn/no-null: off
    unicorn/prefer-add-event-listener: warn
    unicorn/switch-case-braces: off
    '@typescript-eslint/no-unsafe-enum-comparison': off

globals:
    document: readonly
    window: readonly
    navigator: readonly
    NodeJS: readonly
    expect: readonly
    test: readonly
    afterAll: readonly
    beforeAll: readonly
    describe: readonly

ignorePatterns:
    - vite.config.mts
    - dist-electron/**/*.js
    - save/**/*.*
