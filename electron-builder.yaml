---
"$schema": https://raw.githubusercontent.com/electron-userland/electron-builder/master/packages/app-builder-lib/scheme.json
appId: com.electron.{productName}
productName: STMng
copyright: Copyright © 2025 ${author}
asar: true
directories:
  output: release/${version}
  buildResources: resources
files:
  - dist-electron
  - dist
  - build/Release/native.node
  - "!**/node_modules/**/*.d.ts.map"
  - "!**/node_modules/**/*.flow"
  - "!**/node_modules/**/tsconfig.tsbuildinfo"
  - "!**/node_modules/**/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/spglib-2.5.0/**/*.*"
asarUnpack:
  - dist/bin/ffmpeg.exe
  - dist/bin/ffmpeg
  - dist/doc/**/*.*
  - dist/Worker.js
electronLanguages:
  - en-US
linux:
  icon: resources/icon.png
  category: Visualization
  target:
  - AppImage
  extraFiles:
    - from: build/Release/libsymspg.so.2.3.2
      to: ./libsymspg.so.2
mac:
  artifactName: "${productName}_${version}.${ext}"
  target:
  - dmg
win:
  target:
  - target: nsis
    arch:
    - x64
  artifactName: ${productName}-${version}-setup.${ext}
  extraFiles:
    - from: src/cpp/spglib-2.5.0/build/Debug/symspg.dll
      to: .
    - from: src/cpp/spglib-2.5.0/build/Debug/symspg.dll
      to: build/Release/symspg.dll
nsis:
  oneClick: false
  perMachine: true
  selectPerMachineByDefault: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  # createStartMenuShortcut: true
